name: sqemes-local

services:
  app:
    build:
      context: .
    command: npm run dev -- --host 0.0.0.0 --port 3000
    init: true
    ports:
      - "${SQEMES_PORT:-3000}:3000"
    env_file:
      - path: .env.local
        required: false
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - sqemes-node-modules:/app/node_modules

  app-preview:
    profiles:
      - preview
    build:
      context: .
    command: sh -c "npm run build && npm run preview -- --host 0.0.0.0 --port 3000"
    init: true
    ports:
      - "${SQEMES_PORT:-3000}:3000"
    env_file:
      - path: .env.local
        required: false
    environment:
      NODE_ENV: production

volumes:
  sqemes-node-modules:
