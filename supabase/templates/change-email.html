<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>Confirm your new email — Sqemes</title>
</head>
<body style="margin:0; padding:0; background:#f1f5f9; -webkit-font-smoothing:antialiased; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <div style="display:none; max-height:0; overflow:hidden; opacity:0; color:transparent;">Confirm your new Sqemes email address.</div>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f1f5f9;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:480px; margin:0 auto;">
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <img src="https://app.sqemes.com/logo-primary-V2.png" alt="Sqemes" width="120" style="display:block; border:0; height:auto; width:120px;">
            </td>
          </tr>
          <tr>
            <td style="background:#ffffff; border:1px solid #e2e8f0; border-radius:16px; padding:40px;">
              <h1 style="margin:0 0 16px; color:#0f172a; font-size:22px; font-weight:700; line-height:1.3;">Confirm your new email</h1>
              <div style="color:#475569; font-size:15px; line-height:1.65;">
                <p style="margin:0;">Confirm this email address to finish updating the email on your Sqemes account.</p>
              </div>
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:28px 0 4px;">
                <tr>
                  <td align="center" bgcolor="#6366f1" style="border-radius:12px;">
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block; padding:14px 34px; color:#ffffff; font-size:15px; font-weight:700; text-decoration:none; border-radius:12px;">Confirm email change</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding:24px 16px 0;">
              <p style="margin:0 0 8px; color:#94a3b8; font-size:13px; line-height:1.5;">If you didn't request this change, you can ignore this email and your address stays the same.</p>
              <p style="margin:0; color:#cbd5e1; font-size:12px;">&copy; Sqemes &middot; <a href="https://sqemes.com" style="color:#94a3b8; text-decoration:none;">sqemes.com</a></p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
