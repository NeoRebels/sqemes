server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted assets, never cache the entrypoint.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SQEM-126 — runtime instance config is regenerated on restart; never cache it, so a
    # changed instance URL takes effect on the next load without a hard refresh.
    location = /config.js {
        add_header Cache-Control "no-store";
    }

    # SPA fallback — the app uses hash routing, but this keeps deep links / refreshes safe.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
